name: Publish gemi to npm

# Publishes the `gemi` package (packages/gemi) to npm.
#
# Triggers:
#   - a published GitHub Release (create a release, e.g. tag `v0.41.0`);
#   - manual dispatch, optionally under a non-default dist-tag (e.g. `next`).
#
# Authenticates to npm via OIDC trusted publishing (no token secret). Configure
# gemi's trusted publisher on npm to point at this workflow file (publish.yml).
# Publishing this way also attaches build provenance automatically.
#
# Version bumps stay manual — the workflow publishes whatever version is in
# packages/gemi/package.json and no-ops if it's already on npm.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dist-tag:
        description: "npm dist-tag (leave blank to derive: prereleases -> their identifier, e.g. rc; stable -> latest)"
        required: false
        default: ""

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for OIDC trusted publishing — npm exchanges this token for
      # short-lived publish credentials.
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing needs npm >= 11.5.1; node 22 ships npm 10, and the
      # latest npm requires node >= 22.
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build and stage package
        working-directory: packages/gemi
        run: bun run build:publish

      - name: Resolve dist-tag
        id: tag
        working-directory: packages/gemi
        # A blank input derives the tag from the version, so a prerelease can
        # never silently take over `latest`: 0.50.0-rc.1 publishes under `rc`,
        # a stable 0.50.0 under `latest`. An explicit input always wins. This
        # also protects the `release: published` path, which fires for
        # prereleases too and otherwise has no input to fall back on.
        run: |
          VERSION=$(node -p "require('./package.json').version")
          REQUESTED="${{ github.event.inputs.dist-tag }}"
          if [ -n "$REQUESTED" ]; then
            TAG="$REQUESTED"
          elif [ "${{ github.event.release.prerelease }}" = "true" ] || [[ "$VERSION" == *-* ]]; then
            PRE="${VERSION#*-}"        # 0.50.0-rc.1 -> rc.1
            TAG="${PRE%%.*}"           # rc.1        -> rc
            [ -n "$TAG" ] || TAG="next"
          else
            TAG="latest"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing gemi@$VERSION under dist-tag: $TAG"

      - name: Skip if this version is already published
        id: check
        working-directory: packages/gemi
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "gemi@$VERSION" version >/dev/null 2>&1; then
            echo "gemi@$VERSION is already published — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.check.outputs.skip == 'false'
        working-directory: packages/gemi/.publish
        # OIDC trusted publishing — no NODE_AUTH_TOKEN. npm detects the id-token
        # permission and authenticates via OIDC, attaching provenance.
        run: npm publish --access public --tag "${{ steps.tag.outputs.tag }}"

      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.skip }}" = "true" ]; then
            echo "gemi@${{ steps.check.outputs.version }} already on npm — nothing published." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Published gemi@${{ steps.check.outputs.version }} under tag \`${{ steps.tag.outputs.tag }}\`." >> "$GITHUB_STEP_SUMMARY"
          fi
